<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Fraud Detection System | Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Segoe UI, sans-serif;
        }

        .login-card{
            width:420px;
            border:none;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
            border-radius:15px 15px 0 0 !important;
        }

        .logo{
            font-size:55px;
            margin-bottom:10px;
        }

        .form-control{
            height:45px;
        }

        .btn-login{
            width:100%;
            height:45px;
            font-weight:bold;
        }

        .footer{
            text-align:center;
            font-size:13px;
            color:gray;
            margin-top:20px;
        }
    </style>

</head>

<body>

<div class="card login-card">

    <div class="card-header">

        <div class="logo">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3>Invoice Fraud Detection</h3>

        <p class="mb-0">
            Secure Login
        </p>

    </div>

    <div class="card-body p-4">

        <form action="/login" method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    class="form-control"
                    name="username"
                    placeholder="Enter Username"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    class="form-control"
                    name="password"
                    placeholder="Enter Password"
                    required>

            </div>

            <button class="btn btn-primary btn-login">
                <i class="bi bi-box-arrow-in-right"></i>
                Login
            </button>

        </form>

        <div class="footer">

            AI Based Vendor Invoice Fraud Detection System

            <br>

            Version 1.0

        </div>

    </div>

</div>

</body>
</html>
